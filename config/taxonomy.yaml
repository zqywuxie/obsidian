version: "0.1.0"

domain:
  name: "immunology-and-t-cell-biology"
  description: "免疫学与T细胞生物学研究，涵盖T细胞亚型、免疫组库分析、高通量测序数据处理"

canonical_tag_style: lowercase-hyphen

base_tags:
  - literature-note
  - reading-note
  - immunology

usage_rules:
  principle: "使用最小的稳定标签集，足以支持检索、比较和综述写作即可。"
  evidence_required: true
  promote_candidate_when:
    - "该概念出现在多篇文献中"
    - "该概念能改善检索或对比效果"
    - "该概念有明确的实验证据支撑"

